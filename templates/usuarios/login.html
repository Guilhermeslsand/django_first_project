<!-- login -->
{% extends 'shared/base.html' %}
{% load static %}
{% block content %}
<section class="galeria" style="margin-left: 5em">
    <form action="{% url 'login' %}" method="POST">
        {% csrf_token %}
        <div class="row">
            {% for field in form.visible_fields %}
            <div class="col-12 col-lg-12" style="margin-bottom: 10px;">
                <label for="{{ field.id_for_label }}" style="color:#D9D9D9; margin-bottom: 5px;">{{field.label}}</label>
                {{ field }}
            </div>
            {% endfor %}
        </div>
        <div class="social-media">
            <div class="social-media-details">
                <a href="http://localhost:8000/accounts/github/login/?process=login&next={% url 'index' %}">
                    <img src="{% static 'assets/ícones/1x/github.svg' %}" 
                    alt="Ícone para realizar a Autenticação com o Github"
                    class="social-media-icon">
                    <p style="color:#D9D9D9; margin-bottom: 5px;">Github</p>
                </a>
            </div>
        </div>
        <div>
            <button type="submit" class="btn btn-success col-12" style="padding: top 5px;">Logar</button>
        </div>
    </form>
</section>
{% endblock %}
